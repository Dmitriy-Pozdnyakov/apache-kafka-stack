server {
    listen 80;
    server_name _;
    resolver 127.0.0.11 valid=10s ipv6=off;

    location = / {
        root /usr/share/nginx/html;
        try_files /index.html =404;
    }

    location /grafana/ {
        set $grafana_upstream grafana:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_pass http://$grafana_upstream;
    }

    location = /kafka-ui {
        return 302 /kafka-ui/;
    }

    location /kafka-ui/ {
        set $kafka_ui_upstream kafka-ui:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_pass http://$kafka_ui_upstream;
    }

    location /vmui/ {
        set $vmui_upstream victoria-metrics:8428;
        auth_basic "VictoriaMetrics";
        auth_basic_user_file /etc/nginx/vmui_htpasswd;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_pass http://$vmui_upstream/vmui/;
    }

    location /schema-registry/ {
        set $schema_registry_upstream schema-registry:8081;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_pass http://$schema_registry_upstream/;
    }

    location = /kafka-exporter {
        return 302 /kafka-exporter/metrics;
    }

    location = /kafka-exporter/ {
        return 302 /kafka-exporter/metrics;
    }

    location /kafka-exporter/metrics {
        set $kafka_exporter_upstream kafka-exporter:9308;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_pass http://$kafka_exporter_upstream/metrics;
    }
}
